version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apppassword}
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB:-appdb};Username=${POSTGRES_USER:-appuser};Password=${POSTGRES_PASSWORD:-apppassword}"
      Jwt__Secret: ${JWT_SECRET:-super_secret_dev_key}
      Jwt__Issuer: ${JWT_ISSUER:-login-app}
      Jwt__Audience: ${JWT_AUDIENCE:-login-app}
      Jwt__ExpMinutes: ${JWT_EXP_MINUTES:-60}
    ports:
      - "8081:8080"
    depends_on:
      - db

  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB:-appdb};Username=${POSTGRES_USER:-appuser};Password=${POSTGRES_PASSWORD:-apppassword}"
      Jwt__Secret: ${JWT_SECRET:-super_secret_dev_key}
      Jwt__Issuer: ${JWT_ISSUER:-login-app}
      Jwt__Audience: ${JWT_AUDIENCE:-login-app}
      Jwt__ExpMinutes: ${JWT_EXP_MINUTES:-60}
    ports:
      - "8082:8080"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    environment:
      VITE_AUTH_API_URL: ${VITE_AUTH_API_URL:-http://localhost:8081}
      VITE_USER_API_URL: ${VITE_USER_API_URL:-http://localhost:8082}
    ports:
      - "5173:5173"
    depends_on:
      - auth-service
      - user-service

volumes:
  db-data:
